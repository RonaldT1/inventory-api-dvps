name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Restore and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ApiInventario/ApiInventario.csproj

      - name: Build
        run: dotnet build ApiInventario/ApiInventario.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ApiInventario.Tests/ApiInventario.Tests.csproj --configuration Release --no-build
  